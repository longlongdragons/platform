# ==========================================
# 短视频平台 Nginx 配置
# 部署位置: /etc/nginx/conf.d/video-platform.conf
# ==========================================
# 静态资源(图片/视频) -> 直接由 Nginx 读取本地文件
# 动态接口 /api/*     -> 反向代理到后端 SpringBoot
# 前端 SPA            -> history 模式回退到 index.html
# 跨域 / 文件分片上传 / 静态资源缓存 / Gzip

# 上游后端服务
upstream video_backend {
    server 127.0.0.1:8090 weight=1 max_fails=3 fail_timeout=30s;
    # 实际生产可加多实例
    # server 127.0.0.1:8091 weight=1 max_fails=3 fail_timeout=30s;
}

server {
    listen       80;
    server_name  localhost;

    # 客户端上传大小(分片上传)
    client_max_body_size 500m;
    client_body_buffer_size 128k;

    # Gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/font-woff2;
    gzip_vary on;

    # ======================================
    # 1) 静态资源(视频/图片) - Nginx 直接服务
    #    浏览器访问 http://host/static/videos/xxx.mp4
    #    走本地文件系统，不经过后端，提升访问速度
    # ======================================
    location /static/ {
        alias E:/others/javaweb/Project/platform/upload/;
        # Linux 写法: alias /data/video-platform/upload/;
        autoindex off;
        expires 30d;                    # 强缓存 30 天
        add_header Cache-Control "public, max-age=2592000";
        add_header Access-Control-Allow-Origin "*";

        # mp4 文件开启拖动(伪流)
        location ~* \.mp4$ {
            mp4;
            mp4_buffer_size 4m;
            mp4_max_buffer_size 10m;
        }
    }

    # ======================================
    # 2) 后端 API 反向代理
    # ======================================
    location /api/ {
        proxy_pass         http://video_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # 上传超时
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        send_timeout         300s;

        # 跨域头(若后端已配 CORS，可注释)
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization,Content-Type";
        if ($request_method = OPTIONS) { return 204; }
    }

    # ======================================
    # 3) 前端 SPA - Vue3 history 模式
    #    非 /api 且非 /static 全部回退 index.html
    # ======================================
    location / {
        root   E:/others/javaweb/Project/platform/frontend/dist;
        # Linux: root /data/video-platform/frontend/dist;
        try_files $uri $uri/ /index.html;
        index  index.html;

        # SPA 不缓存 html，避免发布后旧版
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 错误页
    error_page 502 503 504 /50x.html;
    location = /50x.html { root html; }
}
