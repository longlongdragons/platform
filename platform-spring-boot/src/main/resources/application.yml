server:
  port: 8090
  servlet:
    context-path: /

spring:
  application:
    name: video-platform
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/video_platform?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
    username: root
    password: password
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 200MB
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: org.example.platformspringboot.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: Q2hhbmdlVGhpc1RvQVZlcnlMb25nUmFuZG9tU2VjcmV0S2V5Rm9yand0U2lnbmluZw==
  expire: 604800          # 7天
  header: Authorization

# 文件上传
file:
  upload-dir: E:/others/javaweb/Project/platform/upload
  # 站点域名(用于拼接URL)
  domain: http://localhost:8090
  nginx-prefix: /static/

# 布隆过滤器
bloom:
  video:
    expected-insertions: 100000
    false-positive-rate: 0.01

logging:
  level:
    org.example.platformspringboot: debug
